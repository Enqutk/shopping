# Production stack for VPS with Dokploy-managed Postgres.
# Usage on the server:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Postgres runs as a separate Dokploy Database service (not in this compose file).
# Set DATABASE_URL in Dokploy Environment, e.g.:
#   postgresql://postgres:PASSWORD@luxe-shopping:5432/shopping

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3000
      NODE_ENV: production
    networks:
      - dokploy-network
      - default

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
    restart: unless-stopped
    ports:
      - '4200:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - dokploy-network
      - default

networks:
  dokploy-network:
    external: true
